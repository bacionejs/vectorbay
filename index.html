<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<script src=index.js defer></script>
<style>
*{
	margin:0;
	box-sizing:border-box;
	overflow:hidden;
	touch-action:none;
	user-select:none;
}
body{
	display:flex;
}
canvas{
	width:100dvmin;
	aspect-ratio:1;
	background:#fff;
  border:1px solid black;
}
#toolbar{
	display:flex;
	background:silver;
}
#toolbar>div{
	display:grid;
	place-items:center;
	border:1px solid black;
	width:10cqb;
	aspect-ratio:1;
}
#toolbar>div:active{background:gray}
@media (orientation: portrait) {
body{
	flex-direction:column;
}
#toolbar{
	width:100cqmin;
	height:10cqmin;
	flex-direction:row;
}
}
@media (orientation: landscape) {
body{
	flex-direction:row;
}
#toolbar{
	width:10cqmin;
	height:100cqmin;
	flex-direction:column;
}
}
</style>
<div id="toolbar"></div>
<canvas id="C"></canvas>
